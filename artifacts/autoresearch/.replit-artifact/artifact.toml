kind = "web"
previewPath = "/"
title = "AutoResearch"
version = "1.0.0"
id = "artifacts/autoresearch"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 25945
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/autoresearch run dev"

[services.env]
PORT = "25945"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/autoresearch", "run", "build"]
publicDir = "artifacts/autoresearch/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
