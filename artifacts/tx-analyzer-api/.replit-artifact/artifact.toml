kind = "api"
previewPath = "/tx-analyzer-api"
title = "TX Analyzer API"
version = "1.0.0"
id = "artifacts/tx-analyzer-api"

[[services]]
localPort = 8000
name = "TX Analyzer API"
paths = ["/tx-analyzer-api"]

[services.development]
run = "pnpm --filter @workspace/tx-analyzer-api run dev"

[services.production]
build = "pnpm --filter @workspace/tx-analyzer-api run build"

[services.production.run]
args = ["node", "artifacts/tx-analyzer-api/dist/index.cjs"]

[services.production.run.env]
PORT = "8000"

[services.production.health.startup]
path = "/api/healthz"
