# ──────────────────────────────────────────────────────────────────────────
# CDR Observability — Kubernetes Secret (template)
#
# HOW TO USE:
#   1. Base64-encode each secret value:
#        echo -n 'your-value' | base64
#   2. Replace every <BASE64_...> placeholder below with the encoded value.
#   3. Apply:
#        kubectl apply -f secret.yaml -n cdr-observability
#
# DO NOT commit this file with real values to source control.
# ──────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: cdr-secrets
  namespace: cdr-observability
  labels:
    app.kubernetes.io/name: cdr-observability
type: Opaque
data:
  # CommonWell portal credentials
  # echo -n 'your-username@cvs.com' | base64
  cw-username: <BASE64_CW_USERNAME>

  # echo -n 'your-portal-password' | base64
  cw-password: <BASE64_CW_PASSWORD>

  # GCP service account JSON — LOCAL DEV ONLY.
  # On GKE, Workload Identity is used instead — do NOT include this in the cluster Secret.
  # Locally: cat your-sa.json | base64 -w 0
  # gcp-service-account-json: <BASE64_GCP_SERVICE_ACCOUNT_JSON>
