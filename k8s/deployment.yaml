apiVersion: apps/v1
kind: Deployment
metadata:
  name: cdr-observability
  namespace: cdr-observability
  labels:
    app: cdr-observability
    app.kubernetes.io/name: cdr-observability
    app.kubernetes.io/part-of: cvs-commonwell
spec:
  # ────────────────────────────────────────────────────────────────────────
  # IMPORTANT: Keep at 1.
  # The Playwright browser session and the hourly cron scheduler live
  # in-memory. Running 2+ replicas would cause split-brain — two browsers
  # competing for the same CommonWell session + two cron jobs firing
  # simultaneously. Use a RollingUpdate strategy so restarts are graceful.
  # ────────────────────────────────────────────────────────────────────────
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: cdr-observability
  template:
    metadata:
      labels:
        app: cdr-observability
    spec:
      # Graceful shutdown — give Playwright time to close the browser cleanly
      terminationGracePeriodSeconds: 30

      volumes:
        # Persistent data: hourly-snapshots.json + Playwright session cookies
        - name: app-data
          persistentVolumeClaim:
            claimName: cdr-data-pvc

        # Nginx config injected from ConfigMap
        - name: nginx-config
          configMap:
            name: cdr-nginx-config

        # Shared volume so nginx can read the built frontend
        - name: frontend-dist
          emptyDir: {}

      initContainers:
        # Copy frontend assets from the api-server image into the shared volume
        # so the nginx sidecar can serve them without a separate image build.
        - name: copy-frontend
          image: YOUR_REGISTRY/cdr-observability:latest  # ← replace
          imagePullPolicy: Always
          command:
            - sh
            - -c
            - "cp -r /app/frontend-dist/. /mnt/frontend-dist/"
          volumeMounts:
            - name: frontend-dist
              mountPath: /mnt/frontend-dist

      containers:
        # ── Container 1: API server (Node.js + Playwright/Chromium) ──────
        - name: api-server
          image: YOUR_REGISTRY/cdr-observability:latest  # ← replace
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: api
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
            # Data directory for hourly-snapshots.json (on the PVC)
            - name: DATA_DIR
              value: "/data"
            # CommonWell credentials
            - name: CW_USERNAME
              valueFrom:
                secretKeyRef:
                  name: cdr-secrets
                  key: cw-username
            - name: CW_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cdr-secrets
                  key: cw-password
            # Vertex AI / Gemini — GKE uses Workload Identity (ADC); no JSON key needed.
            # Set GCP_PROJECT_ID to your GCP project. The SDK finds credentials
            # automatically via the GKE metadata server.
            - name: GCP_PROJECT_ID
              value: "YOUR_GCP_PROJECT_ID"   # ← replace with your project ID
          volumeMounts:
            - name: app-data
              mountPath: /data
              subPath: snapshots          # hourly-snapshots.json lands here
            - name: app-data
              mountPath: /tmp/cw-sessions
              subPath: cw-sessions        # Playwright session cookies
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "3Gi"   # Chromium peaks ~800 MB; give headroom
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3

        # ── Container 2: nginx — serves the React SPA + proxies /api ────
        - name: frontend
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: nginx.conf
            - name: frontend-dist
              mountPath: /usr/share/nginx/html
              readOnly: true
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
