apiVersion: v1
kind: Service
metadata:
  name: cdr-observability
  namespace: cdr-observability
  labels:
    app: cdr-observability
    app.kubernetes.io/name: cdr-observability
  annotations:
    # ── Internal VPC load balancer (CVS Health internal traffic only) ──
    # Remove this annotation (or change to "External") to make the app
    # reachable from the public internet.
    cloud.google.com/load-balancer-type: "Internal"
spec:
  type: LoadBalancer
  selector:
    app: cdr-observability
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
